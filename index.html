<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>黄金矿工 Gold Miner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  html, body {
    height: 100%;
    width: 100%;
    background: #1a1a2e;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #wrap {
    position: relative;
    /* Keep 4:3 aspect ratio, fit screen */
    aspect-ratio: 4 / 3;
    width: min(100vw, calc(100vh * 4 / 3));
    height: min(100vh, calc(100vw * 3 / 4));
    max-width: 100vw;
    max-height: 100vh;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: linear-gradient(#87CEEB 0%, #87CEEB 25%, #8B4513 25%, #654321 100%);
    touch-action: none;
  }
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-weight: 800;
    text-shadow: 2px 2px 0 #000;
    font-size: clamp(14px, 2.4vmin, 22px);
  }
  #hud .col { display: flex; flex-direction: column; gap: 4px; }
  #hud .right { text-align: right; }
  #hud .total { color: #FFD700; font-size: clamp(12px, 1.8vmin, 16px); opacity: 0.9; }

  /* Big transparent drop button — bottom-right thumb reach on iPad/iPhone */
  .ctrl {
    position: absolute;
    pointer-events: auto;
    border: 3px solid rgba(255, 215, 0, 0.85);
    background: rgba(255, 215, 0, 0.18);
    color: #FFD700;
    text-shadow: 0 2px 6px #000, 0 0 4px #000;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition: transform 0.05s, background 0.05s;
    touch-action: manipulation;
  }
  .ctrl:active {
    background: rgba(255, 215, 0, 0.45);
    transform: scale(0.95);
  }
  #dropBtn {
    right: 3vmin;
    bottom: 5vmin;       /* leave room for time bar */
    width: clamp(70px, 14vmin, 130px);
    height: clamp(70px, 14vmin, 130px);
    border-radius: 50%;
    font-size: clamp(14px, 2.6vmin, 22px);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.1;
    text-align: center;
    background: rgba(255, 215, 0, 0.12);
  }
  #dropBtn .arrow { font-size: clamp(20px, 4vmin, 32px); display: block; margin-bottom: 2px; }

  #muteBtn, #settingsBtn {
    bottom: 5vmin;
    width: clamp(46px, 9vmin, 76px);
    height: clamp(46px, 9vmin, 76px);
    border-radius: 50%;
    font-size: clamp(20px, 4vmin, 32px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.45);
    border-color: rgba(255, 215, 0, 0.6);
    color: #FFD700;
    z-index: 20;       /* stay above overlays so reset is always reachable */
  }
  #muteBtn     { left: 3vmin; }
  #settingsBtn { left: calc(3vmin + clamp(46px, 9vmin, 76px) + 10px); }

  /* Full-canvas invisible tap zone so tapping anywhere also drops */
  #tapZone {
    position: absolute;
    inset: 0;
    pointer-events: auto;
    background: transparent;
    touch-action: manipulation;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.78);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4vmin;
    pointer-events: auto;
    z-index: 10;
  }
  .overlay h1 { font-size: clamp(28px, 6vmin, 56px); margin-bottom: 12px; color: #FFD700; }
  .overlay h2 { font-size: clamp(22px, 4.5vmin, 40px); margin-bottom: 14px; color: #FFD700; }
  .overlay p { font-size: clamp(14px, 2.6vmin, 22px); line-height: 1.7; margin-bottom: 6px; max-width: 80vw; }
  .overlay button {
    margin-top: 22px;
    padding: clamp(12px, 2.2vmin, 18px) clamp(28px, 5vmin, 48px);
    font-size: clamp(18px, 3.2vmin, 26px);
    background: #FFD700;
    color: #1a1a2e;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    font-family: inherit;
    touch-action: manipulation;
    cursor: pointer;
  }
  .overlay button:active { background: #FFA500; transform: scale(0.97); }
  .overlay button.ghost {
    margin-top: 14px;
    padding: clamp(8px, 1.4vmin, 12px) clamp(18px, 3vmin, 30px);
    font-size: clamp(13px, 2.2vmin, 18px);
    background: transparent;
    color: #ff9e9e;
    border: 2px solid rgba(255, 100, 100, 0.6);
  }
  .overlay button.ghost:active { background: rgba(255, 80, 80, 0.25); }
  .hidden { display: none !important; }

  #portraitHint {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.7);
    color: #FFD700;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    z-index: 40;
    pointer-events: none;
    animation: fadeBlink 2.4s ease-in-out infinite;
  }
  @keyframes fadeBlink { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

  /* Drop button gentle pulse during play to invite tap on first level */
  @keyframes dropPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    50%      { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0.18); }
  }
  #dropBtn.hint { animation: dropPulse 1.4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="600"></canvas>

  <div id="hud">
    <div class="col">
      <div>分数: <span id="score">0</span></div>
      <div>目标: <span id="target">200</span></div>
      <div class="total">累计: <span id="totalScore">0</span></div>
    </div>
    <div class="col right">
      <div>第 <span id="level">1</span> 关</div>
      <div>时间: <span id="time">60</span></div>
    </div>
  </div>

  <div id="tapZone"></div>
  <button id="dropBtn" class="ctrl" aria-label="放钩"><span><span class="arrow">⬇</span>放钩</span></button>
  <button id="muteBtn" class="ctrl" aria-label="音乐开关">🔊</button>
  <button id="settingsBtn" class="ctrl" aria-label="设置">⚙️</button>

  <div id="startScreen" class="overlay">
    <h1>⛏ 黄金矿工 ⛏</h1>
    <p>点屏幕任意处 或 右下「放钩」按钮 放下抓钩</p>
    <p>💎钻石 600　🟡金块 50/100/250　🪨石头 10/20</p>
    <p>💣 <b>炸弹</b> (黑色带火星) 千万别抓 — 扣 5 秒！</p>
    <p>💡 收钩时<b>连点屏幕</b>可以加速！抓到重物别干等</p>
    <p>共 20 关，难度慢慢上升 — 第 4 关开始出现炸弹</p>
    <p id="bestLine" class="hidden">🏆 历史最佳累计: <span id="bestScore">0</span></p>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button id="continueBtn" class="hidden">继续游戏</button>
      <button id="startBtn">开始游戏</button>
    </div>
    <button id="resetBtn" class="ghost hidden">重置进度</button>
  </div>

  <div id="levelScreen" class="overlay hidden">
    <h2 id="levelTitle">关卡完成！</h2>
    <p id="levelMsg"></p>
    <button id="nextBtn">下一关</button>
  </div>

  <div id="confirmScreen" class="overlay hidden" style="z-index: 30;">
    <h2 id="confirmTitle">确认</h2>
    <p id="confirmMsg"></p>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button id="confirmOk">确定</button>
      <button id="confirmCancel" class="ghost" style="margin-top:0;">取消</button>
    </div>
  </div>

  <div id="portraitHint" class="hidden">
    <span>🔄 横屏体验更好</span>
  </div>

  <div id="settingsScreen" class="overlay hidden" style="z-index: 25;">
    <h2 id="settingsTitle">⚙️ 设置</h2>
    <p id="settingsProgress">尚未开始游戏</p>
    <p id="settingsBest" class="hidden">🏆 历史最佳累计: <span id="settingsBestScore">0</span></p>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button id="resumeBtn">继续游戏</button>
      <button id="settingsMuteBtn">🔊 音乐: 开</button>
    </div>
    <button id="settingsResetBtn" class="ghost">重置所有进度</button>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <h2>本关未通过</h2>
    <p id="gameOverMsg"></p>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button id="retryBtn">重玩本关</button>
      <button id="restartBtn">从第一关开始</button>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = 150;

  const $ = id => document.getElementById(id);
  const ui = {
    score: $('score'), target: $('target'), level: $('level'), time: $('time'),
    totalScore: $('totalScore'),
    start: $('startScreen'), startBtn: $('startBtn'),
    continueBtn: $('continueBtn'), resetBtn: $('resetBtn'),
    bestLine: $('bestLine'), bestScore: $('bestScore'),
    level_: $('levelScreen'), levelTitle: $('levelTitle'), levelMsg: $('levelMsg'), nextBtn: $('nextBtn'),
    gameOver: $('gameOverScreen'), gameOverMsg: $('gameOverMsg'),
    restartBtn: $('restartBtn'), retryBtn: $('retryBtn'),
    settings: $('settingsScreen'), settingsBtn: $('settingsBtn'),
    settingsTitle: $('settingsTitle'),
    settingsProgress: $('settingsProgress'), settingsBest: $('settingsBest'),
    settingsBestScore: $('settingsBestScore'),
    resumeBtn: $('resumeBtn'), settingsResetBtn: $('settingsResetBtn'),
    settingsMuteBtn: $('settingsMuteBtn'),
    confirm_: $('confirmScreen'), confirmTitle: $('confirmTitle'),
    confirmMsg: $('confirmMsg'), confirmOk: $('confirmOk'), confirmCancel: $('confirmCancel'),
    portraitHint: $('portraitHint'),
    dropBtn: $('dropBtn'), tapZone: $('tapZone'),
    muteBtn: $('muteBtn'),
  };

  // Custom in-page confirm modal — replaces native confirm() which looks bad on iOS
  function askConfirm(msg, onOk, title) {
    ui.confirmTitle.textContent = title || '确认';
    ui.confirmMsg.textContent = msg;
    ui.confirm_.classList.remove('hidden');
    const cleanup = () => ui.confirm_.classList.add('hidden');
    ui.confirmOk.onclick = () => { cleanup(); onOk(); };
    ui.confirmCancel.onclick = cleanup;
  }

  // ---- Audio module: BGM (procedural pentatonic loop) + SFX ----
  const audio = (() => {
    let ctx = null, masterGain = null;
    let muted = false;
    try { muted = localStorage.getItem('gm_muted') === '1'; } catch (_) {}
    let bgmStarted = false;
    let nextBeatTime = 0;
    let beatIdx = 0;
    let bgmTimer = null;
    const MASTER = 0.35;

    function ensureCtx() {
      try {
        if (!ctx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return false;
          ctx = new AC();
          masterGain = ctx.createGain();
          masterGain.gain.value = muted ? 0 : MASTER;
          masterGain.connect(ctx.destination);
        }
        if (ctx.state === 'suspended') ctx.resume();
        return true;
      } catch (_) { return false; }
    }

    function note(freq, start, duration, type, gain) {
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = type || 'triangle';
      osc.frequency.setValueAtTime(freq, start);
      env.gain.setValueAtTime(0, start);
      env.gain.linearRampToValueAtTime(gain, start + 0.015);
      env.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(env);
      env.connect(masterGain);
      osc.start(start);
      osc.stop(start + duration + 0.05);
    }

    // 16-step C-major pentatonic melody + 4-bar bass (C–G–Am–F)
    // C5 523, D5 587, E5 659, G5 784, A5 880
    const MEL = [523, 659, 784, 659, 587, 784, 880, 784,
                 659, 523, 587, 659, 784, 659, 587, 523];
    const BASS = [131, 196, 220, 175]; // C3 G3 A3 F3, one per bar (4 steps)
    const STEP = 0.28;                 // ~107 BPM 16ths feel ≈ chill mining vibe

    function scheduleBGM() {
      if (!ctx || !bgmStarted) return;
      while (nextBeatTime < ctx.currentTime + 0.3) {
        const i = beatIdx % 16;
        note(MEL[i], nextBeatTime, 0.22, 'triangle', 0.06);
        if (i % 4 === 0) note(BASS[i / 4], nextBeatTime, STEP * 4 * 0.95, 'sine', 0.10);
        nextBeatTime += STEP;
        beatIdx++;
      }
    }

    function startBGM() {
      if (!ensureCtx()) return;
      if (bgmStarted) return;
      bgmStarted = true;
      nextBeatTime = ctx.currentTime + 0.1;
      beatIdx = 0;
      bgmTimer = setInterval(scheduleBGM, 100);
    }

    // After tab resume / AudioContext suspend, scheduled note times can lag
    // behind ctx.currentTime, producing a burst of overlapping notes.
    // Call this on visibilitychange-visible to re-anchor the scheduler.
    function resyncBGM() {
      if (!ctx || !bgmStarted) return;
      if (ctx.state === 'suspended') ctx.resume();
      if (nextBeatTime < ctx.currentTime + 0.05) {
        nextBeatTime = ctx.currentTime + 0.05;
      }
    }

    function setMuted(m) {
      muted = m;
      try { localStorage.setItem('gm_muted', m ? '1' : '0'); } catch (_) {}
      if (masterGain && ctx) {
        masterGain.gain.setTargetAtTime(m ? 0 : MASTER, ctx.currentTime, 0.05);
      }
    }

    function sfxGold(value) {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      const base = value >= 250 ? 523 : 659;
      note(base,      t,        0.10, 'square', 0.10);
      note(base * 1.26, t + 0.07, 0.10, 'square', 0.10);
      note(base * 1.50, t + 0.14, 0.18, 'square', 0.10);
    }
    function sfxDiamond() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      note(1047, t,       0.08, 'sine', 0.12);
      note(1568, t + 0.06, 0.08, 'sine', 0.12);
      note(2093, t + 0.12, 0.35, 'sine', 0.12);
    }
    function sfxRock() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      note(150, t,        0.18, 'sawtooth', 0.08);
      note(100, t + 0.05, 0.22, 'sawtooth', 0.06);
    }
    function sfxDrop() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(700, t);
      osc.frequency.exponentialRampToValueAtTime(180, t + 0.18);
      env.gain.setValueAtTime(0.06, t);
      env.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      osc.connect(env); env.connect(masterGain);
      osc.start(t); osc.stop(t + 0.25);
    }
    function sfxLevelClear() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      [523, 659, 784, 1047].forEach((f, i) => note(f, t + i * 0.12, 0.32, 'square', 0.13));
    }
    function sfxTargetReached() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      note(880, t,        0.15, 'sine', 0.12);
      note(1318, t + 0.08, 0.20, 'sine', 0.12);
    }
    function sfxBomb() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      // Noise burst for the explosion (filtered white noise)
      const dur = 0.55;
      const bufSize = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        const decay = Math.pow(1 - i / bufSize, 1.8);
        data[i] = (Math.random() * 2 - 1) * decay;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const env = ctx.createGain();
      env.gain.value = 0.35;
      // simple low-pass-ish via biquad
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 800;
      src.connect(lp); lp.connect(env); env.connect(masterGain);
      src.start(t); src.stop(t + dur);
      // Low rumble underneath
      note(70, t,         0.55, 'sawtooth', 0.20);
      note(45, t + 0.04,  0.45, 'sawtooth', 0.15);
    }
    function sfxLevelFail() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      [392, 349, 294, 247].forEach((f, i) => note(f, t + i * 0.16, 0.38, 'triangle', 0.10));
    }

    return { ensureCtx, startBGM, resyncBGM, setMuted, isMuted: () => muted,
             sfxGold, sfxDiamond, sfxRock, sfxDrop, sfxBomb,
             sfxLevelClear, sfxLevelFail, sfxTargetReached };
  })();

  // ---- Progress: persist current level + accumulated score in localStorage ----
  const progress = (() => {
    const KEY = 'gm_progress';
    function load() {
      try {
        const p = JSON.parse(localStorage.getItem(KEY));
        if (p && typeof p.level === 'number' && p.level >= 1) return p;
      } catch (_) {}
      return null;
    }
    function save(level, totalScore) {
      try {
        const prev = load() || {};
        const best = Math.max(prev.best || 0, totalScore || 0);
        localStorage.setItem(KEY, JSON.stringify({ level, totalScore: totalScore || 0, best }));
      } catch (_) {}
    }
    function clear() {
      try { localStorage.removeItem(KEY); } catch (_) {}
    }
    return { load, save, clear };
  })();

  const ITEMS = {
    goldS:   { color: '#FFD700', stroke: '#B8860B', r: 14, value: 50,  weight: 1.6 },
    goldM:   { color: '#FFD700', stroke: '#B8860B', r: 22, value: 100, weight: 2.4 },
    goldL:   { color: '#FFD700', stroke: '#B8860B', r: 34, value: 250, weight: 4.0 },
    rockS:   { color: '#888',    stroke: '#444',    r: 18, value: 10,  weight: 3.2 },
    rockL:   { color: '#888',    stroke: '#444',    r: 32, value: 20,  weight: 5.0 },
    diamond: { color: '#5DE2FF', stroke: '#1B8FB6', r: 10, value: 600, weight: 0.8 },
    // Bomb: black cartoon bomb with lit fuse. Catching one = wastes time + no score
    // (in the classic game it also destroys what you're already holding).
    bomb:    { color: '#1a1a1a', stroke: '#000000', r: 18, value: 0,   weight: 2.5, penalty: 5 },
  };

  let state, items, hook, miner, lastTime, raf;
  let running = false;
  let currentLevel = 1;
  let totalScore = 0;
  let popups = [];   // floating "+50" texts
  let inputLockUntil = 0;  // ignore taps until this timestamp (prevents tap-through on level start)
  let paused = false;      // settings overlay open => freeze update but keep drawing
  const shake = { amp: 0, t: 0 };  // bomb-triggered screen shake

  // Hand-tuned level curve. Difficulty rises gradually:
  //   - early levels: mostly gold, slow swing, easy targets
  //   - mid: diamonds appear, more rocks, faster swing
  //   - late: dense layouts, tighter time, fast swing
  // Targets ≈ 55–70% of max achievable so you don't need a perfect run.
  const LEVELS = [
    // L1: tutorial — almost free win
    { target: 200,  time: 60, swing: 1.10, counts: { goldS:5, goldM:2 } },
    { target: 350,  time: 60, swing: 1.15, counts: { goldS:5, goldM:3, goldL:1 } },
    { target: 500,  time: 60, swing: 1.20, counts: { goldS:5, goldM:3, goldL:1, rockS:2, diamond:1 } },
    // L4: bombs introduced
    { target: 700,  time: 60, swing: 1.25, counts: { goldS:5, goldM:4, goldL:2, rockS:2, rockL:1, diamond:1, bomb:1 } },
    { target: 900,  time: 55, swing: 1.30, counts: { goldS:6, goldM:4, goldL:2, rockS:3, rockL:1, diamond:1, bomb:1 } },
    { target: 1150, time: 55, swing: 1.35, counts: { goldS:6, goldM:4, goldL:2, rockS:4, rockL:2, diamond:2, bomb:1 } },
    { target: 1400, time: 55, swing: 1.40, counts: { goldS:6, goldM:5, goldL:3, rockS:5, rockL:2, diamond:2, bomb:2 } },
    { target: 1700, time: 50, swing: 1.45, counts: { goldS:7, goldM:5, goldL:3, rockS:6, rockL:3, diamond:2, bomb:2 } },
    { target: 2000, time: 50, swing: 1.50, counts: { goldS:7, goldM:5, goldL:4, rockS:7, rockL:3, diamond:3, bomb:2 } },
    { target: 2350, time: 50, swing: 1.55, counts: { goldS:7, goldM:6, goldL:4, rockS:8, rockL:4, diamond:3, bomb:2 } },
    { target: 2700, time: 50, swing: 1.60, counts: { goldS:8, goldM:6, goldL:4, rockS:8, rockL:4, diamond:3, bomb:3 } },
    { target: 3050, time: 45, swing: 1.65, counts: { goldS:8, goldM:6, goldL:5, rockS:9, rockL:4, diamond:4, bomb:3 } },
    { target: 3400, time: 45, swing: 1.70, counts: { goldS:8, goldM:7, goldL:5, rockS:9, rockL:5, diamond:4, bomb:3 } },
    { target: 3800, time: 45, swing: 1.75, counts: { goldS:9, goldM:7, goldL:5, rockS:10, rockL:5, diamond:4, bomb:3 } },
    { target: 4200, time: 45, swing: 1.80, counts: { goldS:9, goldM:7, goldL:6, rockS:10, rockL:5, diamond:5, bomb:4 } },
    { target: 4700, time: 40, swing: 1.85, counts: { goldS:9, goldM:8, goldL:6, rockS:11, rockL:6, diamond:5, bomb:4 } },
    { target: 5200, time: 40, swing: 1.90, counts: { goldS:10, goldM:8, goldL:6, rockS:11, rockL:6, diamond:5, bomb:4 } },
    { target: 5700, time: 40, swing: 1.95, counts: { goldS:10, goldM:8, goldL:7, rockS:12, rockL:6, diamond:6, bomb:4 } },
    { target: 6300, time: 40, swing: 2.00, counts: { goldS:10, goldM:9, goldL:7, rockS:12, rockL:7, diamond:6, bomb:5 } },
    { target: 7000, time: 40, swing: 2.05, counts: { goldS:11, goldM:9, goldL:7, rockS:12, rockL:7, diamond:7, bomb:5 } },
  ];

  function levelConfig(level) {
    if (level <= LEVELS.length) return LEVELS[level - 1];
    // Beyond L20: keep scaling slowly, capped item counts so layout stays placeable.
    const extra = level - LEVELS.length;
    const base = LEVELS[LEVELS.length - 1];
    return {
      target: base.target + extra * 600,
      time: 40,
      swing: Math.min(2.4, base.swing + extra * 0.02),
      counts: {
        goldS:   Math.min(12, base.counts.goldS + Math.floor(extra / 2)),
        goldM:   Math.min(10, base.counts.goldM + Math.floor(extra / 3)),
        goldL:   Math.min(8,  base.counts.goldL + Math.floor(extra / 4)),
        rockS:   Math.min(14, base.counts.rockS + Math.floor(extra / 2)),
        rockL:   Math.min(8,  base.counts.rockL + Math.floor(extra / 3)),
        diamond: Math.min(8,  base.counts.diamond + Math.floor(extra / 3)),
        bomb:    Math.min(7,  (base.counts.bomb || 0) + Math.floor(extra / 4)),
      }
    };
  }

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function placeItems(counts) {
    const placed = [];
    const minY = GROUND_Y + 50;
    const maxY = H - 30;
    const minX = 25, maxX = W - 25;
    // Place biggest items first so they're more likely to find room.
    const order = ['goldL', 'rockL', 'goldM', 'rockS', 'bomb', 'goldS', 'diamond'];
    for (const kind of order) {
      const n = counts[kind] || 0;
      const def = ITEMS[kind];
      for (let i = 0; i < n; i++) {
        // ±10% random scale so each piece looks slightly different in the same tier
        const scale = rand(0.90, 1.10);
        const r = def.r * scale;
        let tries = 0, ok = false, x, y;
        while (!ok && tries < 200) {
          x = rand(minX + r, maxX - r);
          y = rand(minY + r, maxY - r);
          ok = true;
          for (const p of placed) {
            const dx = p.x - x, dy = p.y - y;
            if (Math.hypot(dx, dy) < p.r + r + 5) { ok = false; break; }
          }
          tries++;
        }
        if (ok) placed.push({
          kind, x, y, r,
          value: def.value, weight: def.weight,
          penalty: def.penalty || 0,
          rotation: rand(-0.3, 0.3),   // small per-piece rotation for variety
          caught: false,
        });
      }
    }
    return placed;
  }

  function resetHook(swingSpeed) {
    return {
      x: miner.x,
      y: miner.y + 30,
      angle: 0,
      swingSpeed: swingSpeed || 1.6,
      swingDir: 1,
      length: 30,
      state: 'swing',
      caught: null,
      reelSpeed: 380,
    };
  }

  function startLevel(level) {
    currentLevel = level;
    const cfg = levelConfig(level);
    state = {
      score: 0,
      target: cfg.target,
      timeLeft: cfg.time,
      maxTime: cfg.time,
      reelBoost: 0,        // tap during reel adds a short speed boost
      timeOnRocks: 0,      // for failure tip
      timeOnBombs: 0,      // bombs hit this level
      everBoosted: false,  // did the player ever use reel boost this level?
      targetReached: false,
    };
    miner = { x: W / 2, y: GROUND_Y - 50, w: 60, h: 70 };
    hook = resetHook(cfg.swing);
    items = placeItems(cfg.counts);
    popups = [];
    shake.amp = 0; shake.t = 0;

    // Snapshot resume point: this level + score carried into it.
    progress.save(level, totalScore);

    ui.score.textContent = state.score;
    ui.target.textContent = state.target;
    ui.level.textContent = level;
    ui.time.textContent = Math.ceil(state.timeLeft);
    ui.totalScore.textContent = totalScore;
    ui.score.style.color = '';
    ui.target.style.color = '';

    ui.start.classList.add('hidden');
    ui.level_.classList.add('hidden');
    ui.gameOver.classList.add('hidden');

    // Pulse the drop button only on L1 to draw attention to the control
    if (level === 1) ui.dropBtn.classList.add('hint');
    else ui.dropBtn.classList.remove('hint');

    running = true;
    lastTime = performance.now();
    inputLockUntil = lastTime + 400;  // brief grace period so tap-through can't drop the hook immediately
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  function endLevel() {
    running = false;
    cancelAnimationFrame(raf);
    if (state.score >= state.target) {
      totalScore += state.score;
      ui.totalScore.textContent = totalScore;
      const FINAL_LEVEL = 20;
      if (currentLevel === FINAL_LEVEL) {
        ui.levelTitle.textContent = '🏆 全部通关！';
        ui.levelMsg.innerHTML =
          `恭喜通关全部 ${FINAL_LEVEL} 关！<br>本关得分: <b>${state.score}</b><br>累计总分: <b>${totalScore}</b><br>` +
          `<span style="font-size:0.9em;opacity:0.9;">还可以继续挑战 +1 关 (无尽模式)</span>`;
        ui.nextBtn.textContent = '挑战第 21 关';
      } else {
        ui.levelTitle.textContent = `第 ${currentLevel} 关 通关！`;
        ui.levelMsg.innerHTML =
          `本关得分: <b>${state.score}</b>　目标: ${state.target}<br>累计总分: <b>${totalScore}</b>`;
        ui.nextBtn.textContent = `进入第 ${currentLevel + 1} 关`;
      }
      ui.nextBtn.onclick = () => { kickAudio(); startLevel(currentLevel + 1); };
      ui.level_.classList.remove('hidden');
      audio.sfxLevelClear();
    } else {
      // Helpful hint based on what went wrong
      let hint;
      if (state.timeOnBombs >= 2) {
        hint = '💥 提示: 这关碰到 ' + state.timeOnBombs + ' 颗炸弹，黑色带火星的就是 TNT，要避开';
      } else if (state.timeOnBombs === 1) {
        hint = '💥 提示: 碰到了炸弹（-5 秒），黑色带火星的物体千万别抓';
      } else if (state.timeOnRocks > 8) {
        hint = '🪨 提示: 这关在岩石上花了 ' + Math.round(state.timeOnRocks) + ' 秒，下次避开石头';
      } else if (state.score < state.target * 0.4) {
        hint = '💎 提示: 优先抓钻石（600 分）和大金块（250 分），分数效率最高';
      } else if (!state.everBoosted) {
        hint = '⚡ 提示: 收钩时<b>连点屏幕</b>可以加速！别干等';
      } else {
        hint = '💡 提示: 就差一点点，再试一次！';
      }
      ui.gameOverMsg.innerHTML =
        `差了 <b>${state.target - state.score}</b> 分<br>本关得分: ${state.score}　目标: ${state.target}<br>累计总分: ${totalScore}<br><span style="font-size:0.85em;opacity:0.9;">${hint}</span>`;
      ui.gameOver.classList.remove('hidden');
      audio.sfxLevelFail();
    }
  }

  function dropHook() {
    if (!running) return;
    if (paused) return;
    if (performance.now() < inputLockUntil) return;
    if (hook.state === 'swing') {
      hook.state = 'extend';
      audio.sfxDrop();
      ui.dropBtn.classList.remove('hint');  // first drop kills the pulse hint
    } else if (hook.state === 'reel' && hook.caught) {
      // Tap-spam during reel = small speed boost (gives the player something to DO
      // while reeling a heavy rock instead of just waiting). Capped per drop.
      state.reelBoost = Math.min(state.reelBoost + 60, 400);
      state.everBoosted = true;
    }
  }

  function update(dt) {
    state.timeLeft -= dt;
    ui.time.textContent = Math.max(0, Math.ceil(state.timeLeft));
    if (state.timeLeft <= 0) { state.timeLeft = 0; endLevel(); return; }

    if (hook.state === 'swing') {
      hook.angle += hook.swingSpeed * hook.swingDir * dt;
      const maxA = 1.25;
      if (hook.angle > maxA) { hook.angle = maxA; hook.swingDir = -1; }
      if (hook.angle < -maxA) { hook.angle = -maxA; hook.swingDir = 1; }
      hook.length = 30;
    } else if (hook.state === 'extend') {
      hook.length += 360 * dt;
      const tip = hookTip();
      if (tip.y > H + 20 || tip.x < -20 || tip.x > W + 20) {
        hook.state = 'reel';
      } else {
        for (const it of items) {
          if (it.caught) continue;
          const dx = tip.x - it.x, dy = tip.y - it.y;
          if (Math.hypot(dx, dy) < it.r) {
            it.caught = true;
            hook.caught = it;
            hook.catchX = it.x;   // remember where the catch happened for popup origin
            hook.catchY = it.y;
            hook.state = 'reel';
            break;
          }
        }
      }
    } else if (hook.state === 'reel') {
      const factor = hook.caught ? hook.caught.weight : 1;
      // Apply tap boost (decays naturally as we consume it)
      const boost = state.reelBoost;
      state.reelBoost = Math.max(0, boost - 240 * dt);
      hook.length -= (hook.reelSpeed / factor + boost) * dt;
      if (hook.caught) {
        const tip = hookTip();
        hook.caught.x = tip.x;
        hook.caught.y = tip.y;
        if (hook.caught.kind.startsWith('rock')) state.timeOnRocks += dt;
      }
      if (hook.length <= 30) {
        hook.length = 30;
        if (hook.caught) {
          if (hook.caught.kind === 'bomb') {
            // 💥 boom — no score, takes a chunk of time away, shake the screen
            const pen = hook.caught.penalty || 5;
            state.timeLeft = Math.max(0, state.timeLeft - pen);
            state.timeOnBombs = (state.timeOnBombs || 0) + 1;
            audio.sfxBomb();
            shake.amp = 14; shake.t = 0.5;
            popups.push({
              x: miner.x,
              y: miner.y - 10,
              text: '💥 -' + pen + ' 秒',
              color: '#FF4136',
              size: 34,
              life: 1.6,
              maxLife: 1.6,
            });
          } else {
            state.score += hook.caught.value;
            ui.score.textContent = state.score;
            if (!state.targetReached && state.score >= state.target) {
              state.targetReached = true;
              ui.target.style.color = '#3CB371';
              ui.score.style.color = '#3CB371';
              audio.sfxTargetReached();
            }
            const isDiamond = hook.caught.kind === 'diamond';
            const isGoodLoot = isDiamond || hook.caught.kind.startsWith('gold');
            if (isDiamond) audio.sfxDiamond();
            else if (hook.caught.kind.startsWith('gold')) audio.sfxGold(hook.caught.value);
            else audio.sfxRock();
            popups.push({
              x: hook.catchX,
              y: hook.catchY - 15,
              text: '+' + hook.caught.value,
              color: isDiamond ? '#5DE2FF' : (isGoodLoot ? '#FFD700' : '#bbb'),
              size: isDiamond ? 36 : (hook.caught.value >= 250 ? 32 : 26),
              life: 1.6,
              maxLife: 1.6,
            });
          }
          items = items.filter(i => i !== hook.caught);
          hook.caught = null;
        }
        hook.state = 'swing';
      }
    }

    for (const p of popups) { p.y -= 50 * dt; p.life -= dt; }
    popups = popups.filter(p => p.life > 0);
    if (shake.t > 0) { shake.t = Math.max(0, shake.t - dt); shake.amp *= 0.88; }
  }

  function hookTip() {
    const a = hook.angle;
    return {
      x: miner.x + Math.sin(a) * hook.length,
      y: (miner.y + 30) + Math.cos(a) * hook.length,
    };
  }

  function draw() {
    ctx.save();
    if (shake.t > 0) {
      ctx.translate((Math.random() - 0.5) * shake.amp, (Math.random() - 0.5) * shake.amp);
    }
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, W, GROUND_Y);
    ctx.fillStyle = '#FFE066';
    ctx.beginPath(); ctx.arc(W - 80, 60, 30, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    drawCloud(120, 50, 28);
    drawCloud(300, 80, 22);
    drawCloud(560, 40, 26);

    const grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    grd.addColorStop(0, '#8B5A2B');
    grd.addColorStop(1, '#3E2A14');
    ctx.fillStyle = grd;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#3CB371';
    ctx.fillRect(0, GROUND_Y - 6, W, 6);

    ctx.fillStyle = '#5C3317';
    ctx.fillRect(miner.x - 50, GROUND_Y - 12, 100, 6);

    drawMiner();
    drawRopeAndHook();
    for (const it of items) drawItem(it);

    // score popups
    for (const p of popups) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life / p.maxLife));
      ctx.fillStyle = p.color;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.font = `bold ${p.size}px system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    }

    const w = (state.timeLeft / state.maxTime) * (W - 40);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(20, H - 18, W - 40, 8);
    ctx.fillStyle = state.timeLeft < 10 ? '#FF4136' : '#FFD700';
    ctx.fillRect(20, H - 18, Math.max(0, w), 8);
    ctx.restore();
  }

  function drawCloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r, y + 4, r * 0.8, 0, Math.PI * 2);
    ctx.arc(x - r, y + 4, r * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawMiner() {
    const { x, y } = miner;
    ctx.fillStyle = '#1f3a8a';
    ctx.fillRect(x - 14, y + 30, 10, 22);
    ctx.fillRect(x + 4, y + 30, 10, 22);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(x - 18, y, 36, 34);
    ctx.fillStyle = '#FFDAB9';
    ctx.fillRect(x - 24, y + 4, 8, 22);
    ctx.fillRect(x + 16, y + 4, 8, 22);
    ctx.fillStyle = '#FFDAB9';
    ctx.beginPath(); ctx.arc(x, y - 12, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(x, y - 14, 15, Math.PI, 0); ctx.fill();
    ctx.fillRect(x - 17, y - 15, 34, 4);
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x, y - 22, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.fillRect(x - 5, y - 12, 2, 2);
    ctx.fillRect(x + 3, y - 12, 2, 2);
  }

  function drawRopeAndHook() {
    const start = { x: miner.x, y: miner.y + 30 };
    const tip = hookTip();
    // Boost feedback: tint the rope yellow + thicken while boost is active
    const boosting = state && state.reelBoost > 30 && hook.state === 'reel';
    ctx.strokeStyle = boosting ? '#FFD700' : '#222';
    ctx.lineWidth = boosting ? 3.5 : 2;
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.stroke();
    if (boosting) {
      // little ⚡ spark above hook
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚡', tip.x + 14, tip.y - 6);
    }

    const a = hook.angle;
    ctx.save();
    ctx.translate(tip.x, tip.y);
    ctx.rotate(a);
    ctx.strokeStyle = '#C0C0C0';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(0, 10); ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 14, 6, Math.PI * 0.15, Math.PI * 0.85, false);
    ctx.stroke();
    ctx.restore();
  }

  function drawItem(it) {
    const def = ITEMS[it.kind];
    ctx.save();
    if (it.kind === 'diamond') {
      // Soft glow halo so it pops in dense scenes
      const glow = ctx.createRadialGradient(it.x, it.y, 0, it.x, it.y, it.r * 2.2);
      glow.addColorStop(0, 'rgba(93, 226, 255, 0.55)');
      glow.addColorStop(1, 'rgba(93, 226, 255, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(it.x, it.y, it.r * 2.2, 0, Math.PI * 2); ctx.fill();
      // Diamond shape (rotate slightly for variety)
      ctx.translate(it.x, it.y);
      ctx.rotate(it.rotation || 0);
      ctx.fillStyle = def.color;
      ctx.strokeStyle = def.stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -it.r);
      ctx.lineTo(it.r, 0);
      ctx.lineTo(0, it.r);
      ctx.lineTo(-it.r, 0);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.moveTo(-it.r * 0.4, -it.r * 0.2);
      ctx.lineTo(0, -it.r * 0.6);
      ctx.lineTo(it.r * 0.1, -it.r * 0.2);
      ctx.closePath(); ctx.fill();
    } else if (it.kind === 'bomb') {
      drawBomb(it);
    } else {
      ctx.translate(it.x, it.y);
      ctx.rotate(it.rotation || 0);
      ctx.fillStyle = def.color;
      ctx.strokeStyle = def.stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, it.r, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(-it.r * 0.35, -it.r * 0.35, it.r * 0.35, 0, Math.PI * 2);
      ctx.fill();
      if (it.kind.startsWith('rock')) {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath(); ctx.arc(it.r * 0.3, it.r * 0.1, it.r * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-it.r * 0.1, it.r * 0.4, it.r * 0.12, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
  }

  function drawBomb(it) {
    // Cartoon bomb: black sphere + lit fuse + spark
    // Body
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(it.x, it.y, it.r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Glossy highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(it.x - it.r * 0.35, it.y - it.r * 0.35, it.r * 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Top cap (cylinder where fuse sticks out)
    ctx.fillStyle = '#444';
    ctx.fillRect(it.x - it.r * 0.25, it.y - it.r - it.r * 0.15, it.r * 0.5, it.r * 0.2);
    // Fuse — curvy line going up-right
    const fx = it.x, fy = it.y - it.r - it.r * 0.15;
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.quadraticCurveTo(fx + it.r * 0.5, fy - it.r * 0.3, fx + it.r * 0.35, fy - it.r * 0.85);
    ctx.stroke();
    // Spark (animated by phase of time)
    const sparkX = fx + it.r * 0.35;
    const sparkY = fy - it.r * 0.85;
    const flicker = 0.7 + 0.3 * Math.sin(performance.now() / 80 + it.x);
    ctx.fillStyle = '#FFC107';
    ctx.beginPath(); ctx.arc(sparkX, sparkY, 4 * flicker, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF5722';
    ctx.beginPath(); ctx.arc(sparkX, sparkY, 2.5 * flicker, 0, Math.PI * 2); ctx.fill();
    // Tiny "TNT" label hint on body? Skip — keep it iconic.
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    if (!paused) update(dt);
    draw();
    raf = requestAnimationFrame(loop);
  }

  // ---- Touch-friendly input ----
  function bindTap(el, fn) {
    let handled = false;
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      handled = true;
      fn();
    }, { passive: false });
    el.addEventListener('mousedown', e => {
      if (handled) { handled = false; return; }
      e.preventDefault();
      fn();
    });
  }
  bindTap(ui.dropBtn, dropHook);
  bindTap(ui.tapZone, dropHook);

  // Prevent iOS double-tap zoom / gestures globally
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('dblclick', e => e.preventDefault());

  // Portrait hint: short narrow viewport -> suggest landscape (iPhone in portrait)
  function checkOrientation() {
    const portraitPhone = window.innerWidth < window.innerHeight &&
                          window.innerWidth < 600;
    ui.portraitHint.classList.toggle('hidden', !portraitPhone);
  }
  checkOrientation();
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', checkOrientation);

  // Auto-pause when the tab/app loses focus (iOS users switch apps a lot).
  // When they come back, open the settings overlay so they confirm before
  // time starts ticking again.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (running && !paused) openSettings();
    } else {
      audio.resyncBGM();   // re-anchor scheduler after tab returns
    }
  });

  function kickAudio() { audio.ensureCtx(); audio.startBGM(); }

  // Show continue / reset / best based on saved progress.
  function refreshStartScreen() {
    const p = progress.load();
    const hasProgress = p && p.level > 1;
    if (hasProgress) {
      ui.continueBtn.textContent = `继续游戏（第 ${p.level} 关）`;
      ui.continueBtn.classList.remove('hidden');
      ui.startBtn.textContent = '重新开始';
      ui.resetBtn.classList.remove('hidden');
    } else {
      ui.continueBtn.classList.add('hidden');
      ui.startBtn.textContent = '开始游戏';
      ui.resetBtn.classList.add('hidden');
    }
    const best = (p && p.best) || 0;
    if (best > 0) {
      ui.bestScore.textContent = best;
      ui.bestLine.classList.remove('hidden');
    } else {
      ui.bestLine.classList.add('hidden');
    }
  }
  refreshStartScreen();

  function freshStart() { kickAudio(); progress.clear(); totalScore = 0; startLevel(1); }
  function freshStartGuarded() {
    const p = progress.load();
    if (p && p.level > 1) {
      askConfirm(`将清除当前进度（第 ${p.level} 关）并从第 1 关重新开始`, freshStart, '⚠️ 重新开始');
    } else freshStart();
  }
  ui.startBtn.onclick    = freshStartGuarded;
  ui.restartBtn.onclick  = freshStartGuarded;
  ui.continueBtn.onclick = () => {
    kickAudio();
    const p = progress.load();
    totalScore = (p && p.totalScore) || 0;
    startLevel((p && p.level) || 1);
  };
  ui.resetBtn.onclick    = () => askConfirm('清除所有进度吗？', doFullReset, '⚠️ 重置进度');
  ui.retryBtn.onclick    = () => { kickAudio(); startLevel(currentLevel); };
  // also handle touchstart on overlay buttons so iOS responds immediately
  // (also resume AudioContext while the gesture is still active)
  for (const b of [ui.startBtn, ui.continueBtn, ui.resetBtn, ui.restartBtn, ui.retryBtn, ui.nextBtn, ui.resumeBtn, ui.settingsMuteBtn, ui.settingsResetBtn, ui.confirmOk, ui.confirmCancel]) {
    b.addEventListener('touchstart', e => {
      e.preventDefault();
      audio.ensureCtx();
      b.click();
    }, { passive: false });
  }

  // Mute toggle (corner button + settings panel button stay in sync)
  function updateMuteIcon() {
    const m = audio.isMuted();
    ui.muteBtn.textContent = m ? '🔇' : '🔊';
    ui.settingsMuteBtn.textContent = m ? '🔇 音乐: 关' : '🔊 音乐: 开';
  }
  function toggleMute() {
    audio.ensureCtx();
    audio.setMuted(!audio.isMuted());
    if (!audio.isMuted()) audio.startBGM();
    updateMuteIcon();
  }
  updateMuteIcon();
  bindTap(ui.muteBtn, toggleMute);
  ui.settingsMuteBtn.onclick = toggleMute;

  // Settings overlay — works any time (start screen, mid-game, after a level)
  function openSettings() {
    if (!ui.settings.classList.contains('hidden')) return;  // already open
    if (running) {
      paused = true;
      ui.settingsTitle.textContent = '⏸ 游戏已暂停';
    } else {
      ui.settingsTitle.textContent = '⚙️ 设置';
    }
    const p = progress.load();
    if (p && p.level >= 1) {
      ui.settingsProgress.textContent =
        `当前进度: 第 ${p.level} 关 / 累计 ${p.totalScore || 0} 分`;
      ui.resumeBtn.classList.remove('hidden');
    } else {
      ui.settingsProgress.textContent = '尚未开始游戏';
      ui.resumeBtn.classList.add('hidden');
    }
    const best = (p && p.best) || 0;
    if (best > 0) {
      ui.settingsBestScore.textContent = best;
      ui.settingsBest.classList.remove('hidden');
    } else {
      ui.settingsBest.classList.add('hidden');
    }
    ui.settings.classList.remove('hidden');
  }
  function closeSettings() {
    ui.settings.classList.add('hidden');
    if (paused) {
      paused = false;
      lastTime = performance.now();  // avoid a huge dt jump on resume
    }
  }
  bindTap(ui.settingsBtn, openSettings);
  ui.resumeBtn.onclick = closeSettings;
  function doFullReset() {
    progress.clear();
    totalScore = 0;
    currentLevel = 1;
    running = false;
    paused = false;
    cancelAnimationFrame(raf);
    // Clean canvas state so the start overlay isn't backed by stale items / shake
    items = [];
    popups = [];
    shake.amp = 0; shake.t = 0;
    miner = { x: W / 2, y: GROUND_Y - 50, w: 60, h: 70 };
    hook = resetHook();
    state = { score: 0, target: LEVELS[0].target, timeLeft: LEVELS[0].time, maxTime: LEVELS[0].time };
    // HUD: reset both text + any green color from a prior targetReached
    ui.score.textContent = 0;
    ui.target.textContent = LEVELS[0].target;
    ui.level.textContent = 1;
    ui.time.textContent = LEVELS[0].time;
    ui.totalScore.textContent = 0;
    ui.score.style.color = '';
    ui.target.style.color = '';
    ui.dropBtn.classList.remove('hint');
    // Hide all overlays
    ui.settings.classList.add('hidden');
    ui.level_.classList.add('hidden');
    ui.gameOver.classList.add('hidden');
    ui.confirm_.classList.add('hidden');
    refreshStartScreen();
    ui.start.classList.remove('hidden');
    draw();
  }
  ui.settingsResetBtn.onclick = () => {
    askConfirm('清除所有进度（关卡、累计分、历史最佳）吗？', doFullReset, '⚠️ 重置进度');
  };

  miner = { x: W / 2, y: GROUND_Y - 50, w: 60, h: 70 };
  hook = resetHook();
  items = [];
  state = { score: 0, target: LEVELS[0].target, timeLeft: LEVELS[0].time, maxTime: LEVELS[0].time };
  draw();
})();
</script>
</body>
</html>
