<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>黄金矿工 Gold Miner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  html, body {
    height: 100%;
    width: 100%;
    background: #1a1a2e;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #wrap {
    position: relative;
    /* Keep 4:3 aspect ratio, fit screen */
    width: min(100vw, calc(100vh * 4 / 3));
    height: min(100vh, calc(100vw * 3 / 4));
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: linear-gradient(#87CEEB 0%, #87CEEB 25%, #8B4513 25%, #654321 100%);
    touch-action: none;
  }
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-weight: 800;
    text-shadow: 2px 2px 0 #000;
    font-size: clamp(14px, 2.4vmin, 22px);
  }
  #hud .col { display: flex; flex-direction: column; gap: 4px; }
  #hud .right { text-align: right; }
  #hud .total { color: #FFD700; font-size: clamp(12px, 1.8vmin, 16px); opacity: 0.9; }

  /* Big transparent drop button — bottom-right thumb reach on iPad/iPhone */
  .ctrl {
    position: absolute;
    pointer-events: auto;
    border: 3px solid rgba(255, 215, 0, 0.85);
    background: rgba(255, 215, 0, 0.18);
    color: #FFD700;
    text-shadow: 0 2px 6px #000, 0 0 4px #000;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition: transform 0.05s, background 0.05s;
    touch-action: manipulation;
  }
  .ctrl:active {
    background: rgba(255, 215, 0, 0.45);
    transform: scale(0.95);
  }
  #dropBtn {
    right: 3vmin;
    bottom: 3vmin;
    width: clamp(70px, 14vmin, 130px);
    height: clamp(70px, 14vmin, 130px);
    border-radius: 50%;
    font-size: clamp(14px, 2.6vmin, 22px);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.1;
    text-align: center;
    background: rgba(255, 215, 0, 0.12);
  }
  #dropBtn .arrow { font-size: clamp(20px, 4vmin, 32px); display: block; margin-bottom: 2px; }

  /* Full-canvas invisible tap zone so tapping anywhere also drops */
  #tapZone {
    position: absolute;
    inset: 0;
    pointer-events: auto;
    background: transparent;
    touch-action: manipulation;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.78);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4vmin;
    pointer-events: auto;
    z-index: 10;
  }
  .overlay h1 { font-size: clamp(28px, 6vmin, 56px); margin-bottom: 12px; color: #FFD700; }
  .overlay h2 { font-size: clamp(22px, 4.5vmin, 40px); margin-bottom: 14px; color: #FFD700; }
  .overlay p { font-size: clamp(14px, 2.6vmin, 22px); line-height: 1.7; margin-bottom: 6px; max-width: 80vw; }
  .overlay button {
    margin-top: 22px;
    padding: clamp(12px, 2.2vmin, 18px) clamp(28px, 5vmin, 48px);
    font-size: clamp(18px, 3.2vmin, 26px);
    background: #FFD700;
    color: #1a1a2e;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    font-family: inherit;
    touch-action: manipulation;
    cursor: pointer;
  }
  .overlay button:active { background: #FFA500; transform: scale(0.97); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="600"></canvas>

  <div id="hud">
    <div class="col">
      <div>分数: <span id="score">0</span></div>
      <div>目标: <span id="target">200</span></div>
      <div class="total">累计: <span id="totalScore">0</span></div>
    </div>
    <div class="col right">
      <div>第 <span id="level">1</span> 关</div>
      <div>时间: <span id="time">60</span></div>
    </div>
  </div>

  <div id="tapZone"></div>
  <button id="dropBtn" class="ctrl" aria-label="放钩"><span><span class="arrow">⬇</span>放钩</span></button>

  <div id="startScreen" class="overlay">
    <h1>⛏ 黄金矿工 ⛏</h1>
    <p>点击右下「放钩」按钮 或 屏幕任意处 都能放钩</p>
    <p>💎钻石 600　🟡大金250／中100／小50　⬛石头 10／20</p>
    <p>共 20 关，关卡越往后越难，慢慢提升</p>
    <p>第 1 关只要 200 分，很轻松上手</p>
    <button id="startBtn">开始游戏</button>
  </div>

  <div id="levelScreen" class="overlay hidden">
    <h2 id="levelTitle">关卡完成！</h2>
    <p id="levelMsg"></p>
    <button id="nextBtn">下一关</button>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <h2>本关未通过</h2>
    <p id="gameOverMsg"></p>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button id="retryBtn">重玩本关</button>
      <button id="restartBtn">从第一关开始</button>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = 150;

  const $ = id => document.getElementById(id);
  const ui = {
    score: $('score'), target: $('target'), level: $('level'), time: $('time'),
    totalScore: $('totalScore'),
    start: $('startScreen'), startBtn: $('startBtn'),
    level_: $('levelScreen'), levelTitle: $('levelTitle'), levelMsg: $('levelMsg'), nextBtn: $('nextBtn'),
    gameOver: $('gameOverScreen'), gameOverMsg: $('gameOverMsg'),
    restartBtn: $('restartBtn'), retryBtn: $('retryBtn'),
    dropBtn: $('dropBtn'), tapZone: $('tapZone'),
  };

  const ITEMS = {
    goldS:   { color: '#FFD700', stroke: '#B8860B', r: 14, value: 50,  weight: 1.6 },
    goldM:   { color: '#FFD700', stroke: '#B8860B', r: 22, value: 100, weight: 2.4 },
    goldL:   { color: '#FFD700', stroke: '#B8860B', r: 34, value: 250, weight: 4.0 },
    rockS:   { color: '#888',    stroke: '#444',    r: 18, value: 10,  weight: 3.2 },
    rockL:   { color: '#888',    stroke: '#444',    r: 32, value: 20,  weight: 5.0 },
    diamond: { color: '#5DE2FF', stroke: '#1B8FB6', r: 10, value: 600, weight: 0.8 },
  };

  let state, items, hook, miner, lastTime, raf;
  let running = false;
  let currentLevel = 1;
  let totalScore = 0;
  let popups = [];   // floating "+50" texts

  // Hand-tuned level curve. Difficulty rises gradually:
  //   - early levels: mostly gold, slow swing, easy targets
  //   - mid: diamonds appear, more rocks, faster swing
  //   - late: dense layouts, tighter time, fast swing
  // Targets ≈ 55–70% of max achievable so you don't need a perfect run.
  const LEVELS = [
    // L1: tutorial — almost free win
    { target: 200,  time: 60, swing: 1.10, counts: { goldS:5, goldM:2 } },
    { target: 350,  time: 60, swing: 1.15, counts: { goldS:5, goldM:3, goldL:1 } },
    { target: 500,  time: 60, swing: 1.20, counts: { goldS:5, goldM:3, goldL:1, rockS:2, diamond:1 } },
    { target: 700,  time: 60, swing: 1.25, counts: { goldS:5, goldM:4, goldL:2, rockS:2, rockL:1, diamond:1 } },
    { target: 900,  time: 55, swing: 1.30, counts: { goldS:6, goldM:4, goldL:2, rockS:3, rockL:1, diamond:1 } },
    { target: 1150, time: 55, swing: 1.35, counts: { goldS:6, goldM:4, goldL:2, rockS:4, rockL:2, diamond:2 } },
    { target: 1400, time: 55, swing: 1.40, counts: { goldS:6, goldM:5, goldL:3, rockS:5, rockL:2, diamond:2 } },
    { target: 1700, time: 50, swing: 1.45, counts: { goldS:7, goldM:5, goldL:3, rockS:6, rockL:3, diamond:2 } },
    { target: 2000, time: 50, swing: 1.50, counts: { goldS:7, goldM:5, goldL:4, rockS:7, rockL:3, diamond:3 } },
    { target: 2350, time: 50, swing: 1.55, counts: { goldS:7, goldM:6, goldL:4, rockS:8, rockL:4, diamond:3 } },
    { target: 2700, time: 50, swing: 1.60, counts: { goldS:8, goldM:6, goldL:4, rockS:8, rockL:4, diamond:3 } },
    { target: 3050, time: 45, swing: 1.65, counts: { goldS:8, goldM:6, goldL:5, rockS:9, rockL:4, diamond:4 } },
    { target: 3400, time: 45, swing: 1.70, counts: { goldS:8, goldM:7, goldL:5, rockS:9, rockL:5, diamond:4 } },
    { target: 3800, time: 45, swing: 1.75, counts: { goldS:9, goldM:7, goldL:5, rockS:10, rockL:5, diamond:4 } },
    { target: 4200, time: 45, swing: 1.80, counts: { goldS:9, goldM:7, goldL:6, rockS:10, rockL:5, diamond:5 } },
    { target: 4700, time: 40, swing: 1.85, counts: { goldS:9, goldM:8, goldL:6, rockS:11, rockL:6, diamond:5 } },
    { target: 5200, time: 40, swing: 1.90, counts: { goldS:10, goldM:8, goldL:6, rockS:11, rockL:6, diamond:5 } },
    { target: 5700, time: 40, swing: 1.95, counts: { goldS:10, goldM:8, goldL:7, rockS:12, rockL:6, diamond:6 } },
    { target: 6300, time: 40, swing: 2.00, counts: { goldS:10, goldM:9, goldL:7, rockS:12, rockL:7, diamond:6 } },
    { target: 7000, time: 40, swing: 2.05, counts: { goldS:11, goldM:9, goldL:7, rockS:12, rockL:7, diamond:7 } },
  ];

  function levelConfig(level) {
    if (level <= LEVELS.length) return LEVELS[level - 1];
    // Beyond L20: keep scaling slowly, capped item counts so layout stays placeable.
    const extra = level - LEVELS.length;
    const base = LEVELS[LEVELS.length - 1];
    return {
      target: base.target + extra * 600,
      time: 40,
      swing: Math.min(2.4, base.swing + extra * 0.02),
      counts: {
        goldS:   Math.min(12, base.counts.goldS + Math.floor(extra / 2)),
        goldM:   Math.min(10, base.counts.goldM + Math.floor(extra / 3)),
        goldL:   Math.min(8,  base.counts.goldL + Math.floor(extra / 4)),
        rockS:   Math.min(14, base.counts.rockS + Math.floor(extra / 2)),
        rockL:   Math.min(8,  base.counts.rockL + Math.floor(extra / 3)),
        diamond: Math.min(8,  base.counts.diamond + Math.floor(extra / 3)),
      }
    };
  }

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function placeItems(counts) {
    const placed = [];
    const minY = GROUND_Y + 50;
    const maxY = H - 30;
    const minX = 25, maxX = W - 25;
    // Place biggest items first so they're more likely to find room.
    const order = ['goldL', 'rockL', 'goldM', 'rockS', 'goldS', 'diamond'];
    for (const kind of order) {
      const n = counts[kind] || 0;
      const def = ITEMS[kind];
      for (let i = 0; i < n; i++) {
        let tries = 0, ok = false, x, y;
        while (!ok && tries < 200) {
          x = rand(minX + def.r, maxX - def.r);
          y = rand(minY + def.r, maxY - def.r);
          ok = true;
          for (const p of placed) {
            const dx = p.x - x, dy = p.y - y;
            if (Math.hypot(dx, dy) < p.r + def.r + 5) { ok = false; break; }
          }
          tries++;
        }
        if (ok) placed.push({ kind, x, y, r: def.r, value: def.value, weight: def.weight, caught: false });
      }
    }
    return placed;
  }

  function resetHook(swingSpeed) {
    return {
      x: miner.x,
      y: miner.y + 30,
      angle: 0,
      swingSpeed: swingSpeed || 1.6,
      swingDir: 1,
      length: 30,
      state: 'swing',
      caught: null,
      reelSpeed: 380,
    };
  }

  function startLevel(level) {
    currentLevel = level;
    const cfg = levelConfig(level);
    state = {
      score: 0,
      target: cfg.target,
      timeLeft: cfg.time,
      maxTime: cfg.time,
    };
    miner = { x: W / 2, y: GROUND_Y - 50, w: 60, h: 70 };
    hook = resetHook(cfg.swing);
    items = placeItems(cfg.counts);
    popups = [];

    ui.score.textContent = state.score;
    ui.target.textContent = state.target;
    ui.level.textContent = level;
    ui.time.textContent = Math.ceil(state.timeLeft);
    ui.totalScore.textContent = totalScore;

    ui.start.classList.add('hidden');
    ui.level_.classList.add('hidden');
    ui.gameOver.classList.add('hidden');

    running = true;
    lastTime = performance.now();
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  function endLevel() {
    running = false;
    cancelAnimationFrame(raf);
    if (state.score >= state.target) {
      totalScore += state.score;
      ui.totalScore.textContent = totalScore;
      ui.levelTitle.textContent = `第 ${currentLevel} 关 通关！`;
      ui.levelMsg.innerHTML =
        `本关得分: <b>${state.score}</b>　目标: ${state.target}<br>累计总分: <b>${totalScore}</b>`;
      ui.nextBtn.textContent = `进入第 ${currentLevel + 1} 关`;
      ui.nextBtn.onclick = () => startLevel(currentLevel + 1);
      ui.level_.classList.remove('hidden');
    } else {
      ui.gameOverMsg.innerHTML =
        `差了 <b>${state.target - state.score}</b> 分<br>本关得分: ${state.score}　目标: ${state.target}<br>累计总分: ${totalScore}`;
      ui.gameOver.classList.remove('hidden');
    }
  }

  function dropHook() {
    if (running && hook.state === 'swing') hook.state = 'extend';
  }

  function update(dt) {
    state.timeLeft -= dt;
    ui.time.textContent = Math.max(0, Math.ceil(state.timeLeft));
    if (state.timeLeft <= 0) { state.timeLeft = 0; endLevel(); return; }

    if (hook.state === 'swing') {
      hook.angle += hook.swingSpeed * hook.swingDir * dt;
      const maxA = 1.25;
      if (hook.angle > maxA) { hook.angle = maxA; hook.swingDir = -1; }
      if (hook.angle < -maxA) { hook.angle = -maxA; hook.swingDir = 1; }
      hook.length = 30;
    } else if (hook.state === 'extend') {
      hook.length += 360 * dt;
      const tip = hookTip();
      if (tip.y > H + 20 || tip.x < -20 || tip.x > W + 20) {
        hook.state = 'reel';
      } else {
        for (const it of items) {
          if (it.caught) continue;
          const dx = tip.x - it.x, dy = tip.y - it.y;
          if (Math.hypot(dx, dy) < it.r) {
            it.caught = true;
            hook.caught = it;
            hook.state = 'reel';
            break;
          }
        }
      }
    } else if (hook.state === 'reel') {
      const factor = hook.caught ? hook.caught.weight : 1;
      hook.length -= (hook.reelSpeed / factor) * dt;
      if (hook.caught) {
        const tip = hookTip();
        hook.caught.x = tip.x;
        hook.caught.y = tip.y;
      }
      if (hook.length <= 30) {
        hook.length = 30;
        if (hook.caught) {
          state.score += hook.caught.value;
          ui.score.textContent = state.score;
          const isGoodLoot = hook.caught.kind === 'diamond' || hook.caught.kind.startsWith('gold');
          popups.push({
            x: miner.x,
            y: miner.y + 20,
            text: '+' + hook.caught.value,
            color: isGoodLoot ? '#FFD700' : '#bbb',
            life: 1.0,
          });
          items = items.filter(i => i !== hook.caught);
          hook.caught = null;
        }
        hook.state = 'swing';
      }
    }

    for (const p of popups) { p.y -= 30 * dt; p.life -= dt; }
    popups = popups.filter(p => p.life > 0);
  }

  function hookTip() {
    const a = hook.angle;
    return {
      x: miner.x + Math.sin(a) * hook.length,
      y: (miner.y + 30) + Math.cos(a) * hook.length,
    };
  }

  function draw() {
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, W, GROUND_Y);
    ctx.fillStyle = '#FFE066';
    ctx.beginPath(); ctx.arc(W - 80, 60, 30, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    drawCloud(120, 50, 28);
    drawCloud(300, 80, 22);
    drawCloud(560, 40, 26);

    const grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    grd.addColorStop(0, '#8B5A2B');
    grd.addColorStop(1, '#3E2A14');
    ctx.fillStyle = grd;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#3CB371';
    ctx.fillRect(0, GROUND_Y - 6, W, 6);

    ctx.fillStyle = '#5C3317';
    ctx.fillRect(miner.x - 50, GROUND_Y - 12, 100, 6);

    drawMiner();
    drawRopeAndHook();
    for (const it of items) drawItem(it);

    // score popups
    for (const p of popups) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.font = 'bold 24px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    }

    const w = (state.timeLeft / state.maxTime) * (W - 40);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(20, H - 18, W - 40, 8);
    ctx.fillStyle = state.timeLeft < 10 ? '#FF4136' : '#FFD700';
    ctx.fillRect(20, H - 18, Math.max(0, w), 8);
  }

  function drawCloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r, y + 4, r * 0.8, 0, Math.PI * 2);
    ctx.arc(x - r, y + 4, r * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawMiner() {
    const { x, y } = miner;
    ctx.fillStyle = '#1f3a8a';
    ctx.fillRect(x - 14, y + 30, 10, 22);
    ctx.fillRect(x + 4, y + 30, 10, 22);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(x - 18, y, 36, 34);
    ctx.fillStyle = '#FFDAB9';
    ctx.fillRect(x - 24, y + 4, 8, 22);
    ctx.fillRect(x + 16, y + 4, 8, 22);
    ctx.fillStyle = '#FFDAB9';
    ctx.beginPath(); ctx.arc(x, y - 12, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(x, y - 14, 15, Math.PI, 0); ctx.fill();
    ctx.fillRect(x - 17, y - 15, 34, 4);
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x, y - 22, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.fillRect(x - 5, y - 12, 2, 2);
    ctx.fillRect(x + 3, y - 12, 2, 2);
  }

  function drawRopeAndHook() {
    const start = { x: miner.x, y: miner.y + 30 };
    const tip = hookTip();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.stroke();

    const a = hook.angle;
    ctx.save();
    ctx.translate(tip.x, tip.y);
    ctx.rotate(a);
    ctx.strokeStyle = '#C0C0C0';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(0, 10); ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 14, 6, Math.PI * 0.15, Math.PI * 0.85, false);
    ctx.stroke();
    ctx.restore();
  }

  function drawItem(it) {
    const def = ITEMS[it.kind];
    ctx.save();
    if (it.kind === 'diamond') {
      ctx.fillStyle = def.color;
      ctx.strokeStyle = def.stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(it.x, it.y - it.r);
      ctx.lineTo(it.x + it.r, it.y);
      ctx.lineTo(it.x, it.y + it.r);
      ctx.lineTo(it.x - it.r, it.y);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.moveTo(it.x - it.r * 0.4, it.y - it.r * 0.2);
      ctx.lineTo(it.x, it.y - it.r * 0.6);
      ctx.lineTo(it.x + it.r * 0.1, it.y - it.r * 0.2);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle = def.color;
      ctx.strokeStyle = def.stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(it.x, it.y, it.r, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(it.x - it.r * 0.35, it.y - it.r * 0.35, it.r * 0.35, 0, Math.PI * 2);
      ctx.fill();
      if (it.kind.startsWith('rock')) {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath(); ctx.arc(it.x + it.r * 0.3, it.y + it.r * 0.1, it.r * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(it.x - it.r * 0.1, it.y + it.r * 0.4, it.r * 0.12, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    raf = requestAnimationFrame(loop);
  }

  // ---- Touch-friendly input ----
  function bindTap(el, fn) {
    let handled = false;
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      handled = true;
      fn();
    }, { passive: false });
    el.addEventListener('mousedown', e => {
      if (handled) { handled = false; return; }
      e.preventDefault();
      fn();
    });
  }
  bindTap(ui.dropBtn, dropHook);
  bindTap(ui.tapZone, dropHook);

  // Prevent iOS double-tap zoom / gestures globally
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('dblclick', e => e.preventDefault());

  ui.startBtn.onclick = () => { totalScore = 0; startLevel(1); };
  ui.restartBtn.onclick = () => { totalScore = 0; startLevel(1); };
  ui.retryBtn.onclick = () => { startLevel(currentLevel); };
  // also handle touchstart on overlay buttons so iOS responds immediately
  for (const b of [ui.startBtn, ui.restartBtn, ui.retryBtn, ui.nextBtn]) {
    b.addEventListener('touchstart', e => { e.preventDefault(); b.click(); }, { passive: false });
  }

  miner = { x: W / 2, y: GROUND_Y - 50, w: 60, h: 70 };
  hook = resetHook();
  items = [];
  state = { score: 0, target: 650, timeLeft: 60, maxTime: 60 };
  draw();
})();
</script>
</body>
</html>
